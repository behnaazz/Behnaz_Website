<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 320" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E8DEC8"/>
      <stop offset="60%"  stop-color="#EFE6CE"/>
      <stop offset="100%" stop-color="#F0E8D2"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C9D4AE"/>
      <stop offset="100%" stop-color="#B6C49A"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9DAF85"/>
      <stop offset="100%" stop-color="#849770"/>
    </linearGradient>
    <linearGradient id="hill3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#728561"/>
      <stop offset="100%" stop-color="#5A6B4D"/>
    </linearGradient>
    <radialGradient id="sunglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#EDD6BC" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#EDD6BC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="totoroBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#A8A398"/>
      <stop offset="100%" stop-color="#8E8979"/>
    </linearGradient>
  </defs>

  <!-- soft sky -->
  <rect width="1600" height="320" fill="url(#sky)"/>

  <!-- gentle sun -->
  <circle cx="1320" cy="76" r="120" fill="url(#sunglow)"/>
  <circle cx="1320" cy="76" r="34" fill="#EDD6BC" opacity="0.5"/>

  <!-- two soft clouds -->
  <g fill="#F8F1DB" opacity="0.85">
    <ellipse cx="240"  cy="64" rx="64" ry="11"/>
    <ellipse cx="290"  cy="56" rx="36" ry="9"/>
    <ellipse cx="900"  cy="80" rx="56" ry="10"/>
    <ellipse cx="940"  cy="72" rx="32" ry="8"/>
  </g>

  <!-- furthest hills -->
  <path d="M 0 195 Q 200 145 400 180 T 800 165 T 1200 180 T 1600 155 L 1600 320 L 0 320 Z"
        fill="url(#hill1)"/>

  <!-- mid hills -->
  <path d="M 0 230 Q 180 180 380 215 T 760 205 T 1140 215 T 1600 195 L 1600 320 L 0 320 Z"
        fill="url(#hill2)" opacity="0.95"/>

  <!-- nearest grass mound -->
  <path d="M 0 268 Q 220 230 440 258 T 840 248 T 1240 268 T 1600 248 L 1600 320 L 0 320 Z"
        fill="url(#hill3)"/>

  <!-- a tree on the left, silhouetted -->
  <g>
    <rect x="178" y="220" width="5" height="38" fill="#3F4A36"/>
    <circle cx="180" cy="216" r="20" fill="#849770"/>
    <circle cx="166" cy="210" r="13" fill="#9DAF85"/>
    <circle cx="194" cy="210" r="12" fill="#9DAF85"/>
    <circle cx="180" cy="200" r="10" fill="#C9D4AE"/>
  </g>

  <!-- a tree on the far right -->
  <g>
    <rect x="1432" y="218" width="5" height="42" fill="#3F4A36"/>
    <circle cx="1434" cy="214" r="22" fill="#849770"/>
    <circle cx="1418" cy="208" r="14" fill="#9DAF85"/>
    <circle cx="1450" cy="208" r="12" fill="#9DAF85"/>
    <circle cx="1434" cy="198" r="10" fill="#C9D4AE"/>
  </g>

  <!-- ─── BIG TOTORO (center) ─────────────────────────────── -->
  <g transform="translate(800 200)">
    <!-- ears -->
    <path d="M -32 -8 L -28 -50 L -14 -18 Z" fill="url(#totoroBody)"/>
    <path d="M  32 -8 L  28 -50 L  14 -18 Z" fill="url(#totoroBody)"/>
    <path d="M -28 -14 L -27 -42 L -20 -22 Z" fill="#6E695C"/>
    <path d="M  28 -14 L  27 -42 L  20 -22 Z" fill="#6E695C"/>

    <!-- body -->
    <ellipse cx="0" cy="40" rx="58" ry="62" fill="url(#totoroBody)"/>

    <!-- belly -->
    <ellipse cx="0" cy="50" rx="40" ry="45" fill="#EFE6CE"/>

    <!-- chevron belly markings -->
    <path d="M -18 32 L -12 26 L -6 32 L 0 26 L 6 32 L 12 26 L 18 32"
          stroke="#7B7567" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M -16 50 L -10 44 L -4 50 L 0 44 L 4 50 L 10 44 L 16 50"
          stroke="#7B7567" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M -12 68 L -6 62 L 0 68 L 6 62 L 12 68"
          stroke="#7B7567" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- eyes -->
    <circle cx="-14" cy="0" r="7" fill="#FBF6E6"/>
    <circle cx=" 14" cy="0" r="7" fill="#FBF6E6"/>
    <circle cx="-13" cy="1" r="3" fill="#2A2722"/>
    <circle cx=" 15" cy="1" r="3" fill="#2A2722"/>
    <circle cx="-13.5" cy="0.2" r="0.9" fill="#FFFFFF"/>
    <circle cx=" 14.5" cy="0.2" r="0.9" fill="#FFFFFF"/>

    <!-- nose -->
    <path d="M -3.5 9 L 3.5 9 L 0 13 Z" fill="#2A2722"/>

    <!-- whiskers -->
    <line x1="-32" y1="6"  x2="-16" y2="8" stroke="#7B7567" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-32" y1="12" x2="-16" y2="12" stroke="#7B7567" stroke-width="1.2" stroke-linecap="round"/>
    <line x1=" 32" y1="6"  x2=" 16" y2="8" stroke="#7B7567" stroke-width="1.2" stroke-linecap="round"/>
    <line x1=" 32" y1="12" x2=" 16" y2="12" stroke="#7B7567" stroke-width="1.2" stroke-linecap="round"/>

    <!-- tiny stubby arms -->
    <ellipse cx="-50" cy="38" rx="11" ry="6" fill="url(#totoroBody)"/>
    <ellipse cx=" 50" cy="38" rx="11" ry="6" fill="url(#totoroBody)"/>
  </g>

  <!-- ─── SMALL WHITE TOTORO #1 (right of big, peeking from grass) ─── -->
  <g transform="translate(910 250)">
    <!-- ears -->
    <path d="M -13 -2 L -11 -22 L -6 -8 Z" fill="#F4ECD7" stroke="#B8AB8E" stroke-width="0.8"/>
    <path d="M  13 -2 L  11 -22 L  6 -8 Z" fill="#F4ECD7" stroke="#B8AB8E" stroke-width="0.8"/>
    <!-- body -->
    <ellipse cx="0" cy="14" rx="22" ry="22" fill="#F4ECD7" stroke="#B8AB8E" stroke-width="1"/>
    <!-- eyes -->
    <circle cx="-7" cy="10" r="2.6" fill="#2A2722"/>
    <circle cx=" 7" cy="10" r="2.6" fill="#2A2722"/>
    <circle cx="-7" cy="9.4" r="0.7" fill="#FFFFFF"/>
    <circle cx=" 7" cy="9.4" r="0.7" fill="#FFFFFF"/>
    <!-- nose -->
    <path d="M -1.5 14 L 1.5 14 L 0 17 Z" fill="#2A2722"/>
    <!-- tiny smile -->
    <path d="M -3 19 Q 0 21 3 19" stroke="#7B7567" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ─── SMALL WHITE TOTORO #2 (left of big) ─── -->
  <g transform="translate(700 258)">
    <path d="M -11 -1 L -9 -18 L -5 -7 Z" fill="#F4ECD7" stroke="#B8AB8E" stroke-width="0.8"/>
    <path d="M  11 -1 L  9 -18 L  5 -7 Z" fill="#F4ECD7" stroke="#B8AB8E" stroke-width="0.8"/>
    <ellipse cx="0" cy="12" rx="19" ry="19" fill="#F4ECD7" stroke="#B8AB8E" stroke-width="1"/>
    <circle cx="-6" cy="8" r="2.3" fill="#2A2722"/>
    <circle cx=" 6" cy="8" r="2.3" fill="#2A2722"/>
    <circle cx="-6" cy="7.5" r="0.6" fill="#FFFFFF"/>
    <circle cx=" 6" cy="7.5" r="0.6" fill="#FFFFFF"/>
    <path d="M -1.3 12 L 1.3 12 L 0 14.5 Z" fill="#2A2722"/>
  </g>

  <!-- ─── SMALL WHITE TOTORO #3 (far right, on the rise) ─── -->
  <g transform="translate(1180 235)">
    <path d="M -10 0 L -8 -16 L -4 -6 Z" fill="#F4ECD7" stroke="#B8AB8E" stroke-width="0.8"/>
    <path d="M  10 0 L  8 -16 L  4 -6 Z" fill="#F4ECD7" stroke="#B8AB8E" stroke-width="0.8"/>
    <ellipse cx="0" cy="12" rx="17" ry="18" fill="#F4ECD7" stroke="#B8AB8E" stroke-width="1"/>
    <circle cx="-5" cy="8" r="2" fill="#2A2722"/>
    <circle cx=" 5" cy="8" r="2" fill="#2A2722"/>
    <path d="M -1 12 L 1 12 L 0 14 Z" fill="#2A2722"/>
  </g>

  <!-- ─── SMALL WHITE TOTORO #4 (far left, smaller) ─── -->
  <g transform="translate(360 268)">
    <path d="M -8 1 L -7 -12 L -3 -4 Z" fill="#F4ECD7" stroke="#B8AB8E" stroke-width="0.7"/>
    <path d="M  8 1 L  7 -12 L  3 -4 Z" fill="#F4ECD7" stroke="#B8AB8E" stroke-width="0.7"/>
    <ellipse cx="0" cy="10" rx="14" ry="15" fill="#F4ECD7" stroke="#B8AB8E" stroke-width="1"/>
    <circle cx="-4" cy="7" r="1.6" fill="#2A2722"/>
    <circle cx=" 4" cy="7" r="1.6" fill="#2A2722"/>
    <path d="M -0.8 10 L 0.8 10 L 0 12 Z" fill="#2A2722"/>
  </g>

  <!-- grass tufts (foreground texture) -->
  <g stroke="#3F4A36" stroke-width="1.3" stroke-linecap="round" opacity="0.55">
    <path d="M 60 320 L 60 304"/>   <path d="M 92 320 L 94 308"/>
    <path d="M 240 320 L 240 304"/> <path d="M 268 320 L 270 308"/>
    <path d="M 460 320 L 460 304"/> <path d="M 488 320 L 490 308"/>
    <path d="M 560 320 L 560 304"/>
    <path d="M 860 320 L 860 304"/> <path d="M 880 320 L 882 308"/>
    <path d="M 1040 320 L 1040 304"/>
    <path d="M 1280 320 L 1282 308"/><path d="M 1320 320 L 1320 304"/>
    <path d="M 1500 320 L 1502 308"/>
  </g>

  <!-- tall grass blades around totoros -->
  <g stroke="#3F4A36" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M 692 282 Q 690 270 686 264"/>
    <path d="M 705 280 Q 707 268 712 262"/>
    <path d="M 920 280 Q 920 268 916 260"/>
    <path d="M 932 282 Q 935 268 940 262"/>
    <path d="M 1196 258 Q 1200 246 1206 242"/>
  </g>

  <!-- small wildflowers scattered in foreground -->
  <g>
    <!-- daisy 1 -->
    <line x1="320" y1="298" x2="320" y2="284" stroke="#3F4A36" stroke-width="1.2"/>
    <g transform="translate(320 282)">
      <circle cx="-3" cy="0" r="2.3" fill="#F4ECD7"/>
      <circle cx="3"  cy="0" r="2.3" fill="#F4ECD7"/>
      <circle cx="0" cy="-3" r="2.3" fill="#F4ECD7"/>
      <circle cx="0" cy="3"  r="2.3" fill="#F4ECD7"/>
      <circle cx="0" cy="0"  r="1.6" fill="#E5CD92"/>
    </g>
    <!-- coral mini flower -->
    <line x1="540" y1="298" x2="540" y2="288" stroke="#3F4A36" stroke-width="1.2"/>
    <circle cx="540" cy="287" r="3" fill="#E5C4B3"/>
    <circle cx="540" cy="287" r="1.2" fill="#E5CD92"/>
    <!-- daisy 2 -->
    <line x1="970" y1="296" x2="970" y2="282" stroke="#3F4A36" stroke-width="1.2"/>
    <g transform="translate(970 280)">
      <circle cx="-3" cy="0" r="2.3" fill="#F4ECD7"/>
      <circle cx="3"  cy="0" r="2.3" fill="#F4ECD7"/>
      <circle cx="0" cy="-3" r="2.3" fill="#F4ECD7"/>
      <circle cx="0" cy="3"  r="2.3" fill="#F4ECD7"/>
      <circle cx="0" cy="0"  r="1.6" fill="#C97D63"/>
    </g>
    <!-- pink mini -->
    <line x1="1100" y1="294" x2="1100" y2="284" stroke="#3F4A36" stroke-width="1.2"/>
    <circle cx="1100" cy="283" r="2.8" fill="#E5C4C7"/>
    <circle cx="1100" cy="283" r="1.1" fill="#E5CD92"/>
    <!-- yellow mini -->
    <line x1="1370" y1="295" x2="1370" y2="285" stroke="#3F4A36" stroke-width="1.2"/>
    <circle cx="1370" cy="284" r="2.8" fill="#E5CD92"/>
    <circle cx="1370" cy="284" r="1.1" fill="#C97D63"/>
    <!-- another small pink -->
    <line x1="430" y1="298" x2="430" y2="290" stroke="#3F4A36" stroke-width="1.1"/>
    <circle cx="430" cy="289" r="2.4" fill="#E5C4C7"/>
  </g>

  <!-- one floating leaf -->
  <g transform="translate(560 130) rotate(-18)">
    <path d="M 0 0 q -8 -2 -10 -10 q 7 -2 12 4 q 5 5 -2 6 z" fill="#A8B89A" opacity="0.8"/>
    <line x1="0" y1="0" x2="-4" y2="-7" stroke="#3F4A36" stroke-width="0.7"/>
  </g>
  <!-- soft dust motes -->
  <g opacity="0.65">
    <circle cx="430" cy="120" r="1.4" fill="#EDD6BC"/>
    <circle cx="1100" cy="150" r="1.6" fill="#E5C4B3"/>
    <circle cx="1240" cy="110" r="1.2" fill="#E5CD92"/>
    <circle cx="780" cy="120" r="1.3" fill="#E5C4B3"/>
  </g>
</svg>
